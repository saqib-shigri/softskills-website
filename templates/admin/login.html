<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Soft Skills Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-black/50 backdrop-blur-sm p-8 rounded-2xl border border-orange-500/30 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <i class="fas fa-shield-alt text-orange-500 text-5xl mb-3"></i>
            <h1 class="text-3xl font-bold text-white">Admin <span class="text-orange-500">Login</span></h1>
            <p class="text-gray-400 text-sm mt-2">Enter your credentials to access dashboard</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-lg {% if category == 'error' %}bg-red-500/20 border border-red-500 text-red-400{% else %}bg-green-500/20 border border-green-500 text-green-400{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-gray-300 text-sm mb-2">Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 bg-black/50 border border-gray-700 rounded-lg text-white focus:border-orange-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-gray-300 text-sm mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 bg-black/50 border border-gray-700 rounded-lg text-white focus:border-orange-500 focus:outline-none transition">
            </div>
            <button type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition transform hover:scale-[1.02]">
                <i class="fas fa-sign-in-alt mr-2"></i> Login to Dashboard
            </button>
        </form>
        
        <div class="text-center mt-6">
            <p class="text-gray-500 text-xs">🔒 Secure Admin Panel</p>
        </div>
    </div>
</body>
</html>
